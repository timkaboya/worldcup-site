name: Deploy to Cloudflare Pages

# Deploys the built site to the existing Cloudflare Pages project (Live).
#
# Why this exists: the Live site is a git-integrated Cloudflare Pages project,
# but that integration can silently stop deploying new commits. This workflow is
# a reliable, repeatable fallback that pushes each `main` build straight to the
# same Pages project via Wrangler.
#
# It is a SAFE no-op until credentials are configured: the deploy step only runs
# when the CLOUDFLARE_API_TOKEN secret is present, so the Live site is never
# touched before you opt in. To enable, add two repository secrets:
#   • CLOUDFLARE_API_TOKEN   — a Pages "Edit" token
#   • CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account id
# The public Paystack build vars are read from repository Variables (same as the
# GitHub Pages workflow). The Paystack SECRET key stays in the Cloudflare project
# env (runtime only) and is not needed here.
on:
  push:
    branches: [main]
  workflow_dispatch:

# One Cloudflare deploy at a time; let an in-progress run finish.
concurrency:
  group: cloudflare-pages
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Build for Cloudflare (root base path)
        env:
          # Cloudflare serves at the domain root, so no BASE_PATH override.
          # Paystack "Support" button (public keys — safe to expose). Set as
          # repository Variables; if unset, the button simply stays hidden.
          PUBLIC_PAYSTACK_KEY: ${{ vars.PUBLIC_PAYSTACK_KEY }}
          PUBLIC_PAYSTACK_CURRENCY: ${{ vars.PUBLIC_PAYSTACK_CURRENCY }}
        run: npm run build

      - name: Check for Cloudflare credentials
        id: creds
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLOUDFLARE_API_TOKEN not set — skipping Cloudflare deploy. Add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repository secrets to enable."
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.creds.outputs.configured == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=worldcup-site --branch=main
